# 매일 아침(한국 시간 기준) main.py 실행 후 GitHub Pages에 배포합니다.
# 저장소 Settings → Pages → Build: GitHub Actions 로 설정하세요.

name: Deploy outfit to GitHub Pages

on:
  schedule:
    # 21:00 UTC ≈ 다음날 06:00 KST (서울, 서머타임 없음)
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CITY: ${{ secrets.CITY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python scripts/ci_write_env.py

      - name: Generate outfit HTML
        run: python main.py

      - name: Prepare static site (루트 = 오늘의 코디)
        run: |
          mkdir -p _site
          cp output/outfit_today.html _site/index.html
          cp output/outfit_today.html _site/outfit_today.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
